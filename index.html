<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미성초등학교 수업 자료 공유소</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://tailwindcss.com"></script>
    <!-- 눈누 폰트 (나눔스퀘어라운드) 적용 -->
    <style>
        @import url('https://jsdelivr.net');
        body { font-family: 'NanumSquareRound', sans-serif; }
    </style>
</head>
<!-- 💡 전체 배경을 따뜻하고 부드러운 파스텔 살구 베이지 톤으로 변경 -->
<body class="bg-gradient-to-br from-[#fff7ed] via-[#fef3c7] to-[#ffedd5] min-h-screen py-16 px-4">

    <!-- 메인 컨테이너 -->
    <div class="max-w-6xl mx-auto">
        
        <!-- 상단 헤더 -->
        <header class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold text-amber-900 tracking-tight">
                🎒 미성초 수업 보물 창고
            </h1>
            <p class="text-amber-800/70 mt-3 text-sm md:text-base font-medium">
                원하는 보물상자를 클릭해보세요.
            </p>
        </header>

        <!-- 가로 3개, 세로 2개 정렬 그리드 레이아웃 (총 6개) -->
        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
            
            <!-- 단추 1: 안녕 미성초! -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">🪐</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors">안녕 미성초!</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">아이들 영상 자료</p>
            </button>

            <!-- 단추 2: 디지털 갤러리 -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">✏️</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors"> 미성초 갤러리</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">아이들 작품 전시</p>
            </button>

            <!-- 단추 3: 바이브코딩 -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">🧮</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors">바이브코딩</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">할 수 있다!</p>
            </button>

            <!-- 단추 4: 과학정보부 링크 -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">🧮</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors">과학 정보부</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">유용해요!</p>
            </button>

            <!-- 단추 5: 기타자료 -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">✏️</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors">언젠가</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">쓰일 날이 있을거예요</p>
            </button>

            <!-- 단추 6: 예비 -->
            <button onclick="location.href='#'" class="group relative text-left bg-gradient-to-b from-white to-[#fff7ed] border-2 border-orange-200/60 rounded-3xl p-6 shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_8px_16px_rgba(217,119,6,0.15)] hover:shadow-[inset_0_2px_0_0_rgba(255,255,255,0.8),0_12px_20px_rgba(217,119,6,0.25)] hover:-translate-y-1 active:translate-y-[2px] active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200">
                <div class="text-3xl mb-4 filter drop-shadow-[0_2px_3px_rgba(0,0,0,0.1)]">📺</div>
                <h3 class="text-xl font-bold text-amber-950 tracking-tight group-hover:text-orange-600 transition-colors">예비</h3>
                <p class="text-amber-800/60 text-sm mt-1 font-medium">자료 공간</p>
            </button>

        </main>
    </div>

</body>
</html>
